spring.application.name=jira

spring.mongodb.uri=${MONGODB_URI}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Directory where uploaded attachment files are stored
attachment.upload-dir=uploads

# Mail (configure with your SMTP provider; defaults suit local testing via MailHog/Mailpit)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:noreply@jira-clone.local}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

# Profile avatar uploads
avatar.upload-dir=uploads/avatars
avatar.max-size=2097152
email.verification.expiry-minutes=60
app.base-url=${APP_BASE_URL:http://localhost:8080}
